<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        div{
            display:flex;
            border:3px solid #333;
            border-radius:12px;
            margin: 10px;
            align-items: center;
            justify-content: center;
            text-align: center;
            flex-direction:center;
        }
        span{
            display:block
        }
        .diferente{
            font-weight:bold;
            font-size: 30px;
            color: chocolate;
        }
    </style>
</head>
<body>
    <h1>Tags não Visuais</h1>
    <!--tags semáticas:
    section - agrupamento temático de conteúdo
    article - conteúdo auto-contido
    footer  - redapé os lílks de navegação
    aside   - de lado(ex. sidebar). relacionado com o conteúdo em volto (adendo).
    detail  - exibe detalhes que pode ser exibidos ou wscondidos
    
    as formosas...
    div  - divisão do conteúdo
    span - usado para agrupa elementos inline-->
    <div>
        <p>Árial 1</p>
    </div>
    <div>
        <p>Árial 2</p>
    </div>
    <P>
        Ess é um texto com <span class="diferente">muitas palavras</span> e  ponto.
    </P>
</body>
</html>
