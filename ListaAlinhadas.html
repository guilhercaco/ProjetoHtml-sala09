<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listas Alinhadas</title>
    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background-color: #e0ffff;
            color: #005f5f;
            margin: 0;
            padding: 0;
            text-align: center;
        }  
        header{
            background-color: #005ed1;
            color: white;
            padding: 20px;
            font-size: 1.5rem;
        }     
        .tree{
            list-style-type: none;
            padding: 0;
            margin: 0;
            text-align: left;
        } 
        .tree li{
            padding-left: 20px;
            margin: 5px 0;
        }
        .tree span[wm-folder]{
            cursor: pointer;
            font-weight: bold;
            color: #00ced1;
        }
        .tree li > ul {
            display:none;
            margin-left: 20px;
        }
        .tree li > ul li{
            padding-left: 20px;
        }
        .tree li > ul li:hover{
            color:#005f5f;
            border-radius: 5px;
            transition: 0.3s;
        }
        .tree li > span[wm-folder]:hover{
            color:#005f5f
        }

    </style>
</head>
<body>
    <h1>Projeto</h1>
    <ul class="tree">
        <li>
            <span wm-folder>Backend</span>
            <ul>
                <li>
                    <span wm-folder>app</span>
                    <ul>
                        <li>produto.js</li>
                        <li>usario.js</li>
                        <li>venda.js</li>
                    </ul>
                </li>
                <l1>
                    <pan wm-folder>config</pan>
                    <ul>
                        <li>banco.js</li>
                        <li>rotas.js</li>
                        <li>servidor.js</li>
                    </ul>
                </l1>
            </ul>
        </li>
        <li>
        <span wm-folder>frontend</span>
            <ul>
                <li>
                    <span wm-folder>public</span>
                    <ul>
                        <li>app.css</li>
                        <li>app.js</li>
                        <li>index.html</li>
                    </ul>
                </li>
            </ul>
        </li>
    </ul>    

    <link rel="stylesheet" href="http://files.cod3r.com.br/curso-web/tree.css">
    <script>
        document.querySelectorAll('[wm-folder]').forEach(folder =>{
            folder.onclick = function(e){
                const ul = folder.nextElementSibling
                const d = ul.style.display
                ul.style.display = d === 'none'?'block':'none'
            }
        })
    </script>
</body>
