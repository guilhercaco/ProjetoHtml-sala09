<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>listas</title>
    <style>
        body{
            font-family:Arial, Helvetica, sans-serif;
            background-color:#f4f4f9 ;
            color:#333;
            margin:0;
            padding:0;
            display:flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        /*cabeçalho principal*/
        h1{
            font-size:1.8rem;
            color: #00bcd4;
            margin:20px 0;
            text-transform: uppercase;
        }
        ol,ul,dl{
            margin:0;
            padding: 0;
            list-style-position: inside;
            width:100%;
            max-width:600px;
        }
        ol il, ul lí{
            bottom: #fff;
            background-color: #ffff;
            border-radius: 8px;
            padding:12px;
            margin-bottom:8px;
            box-shadow:0 4px 6px rgba(0,0,0,0.1)

        }
        ol il:hover,ul lí:hover{
            transform:translate(-5px);
            background-color:#00bcd4;
            color:#ffff;

        }
        dl dt{
            font-weight: bold;
            color:#00bcd4;
            margin-top:20px;
        }
    </style>
</head>
<body>
    <h1>Listas</h1>
    <!--lista não ordenada-->
    <h2>Aprovador</h2>
    <ol>
        <li>Andre</li>
        <li>Pedro</li>
        <li>Felip</li>
        <li>João</li>
    </ol>
    <!--lista não ordenada-->
    <ul>
        <li>Queijo</li>
        <li>Leitr</li>
        <li>Arroz</li>
        <li>Pão</li>  
    </ul>
    <!--lista de definição-->
    <h2>principais termos do glossário de cloud computing</h2>
    <d1>
        <dt>BaaS</dt>
        <dd>Backend Como Serviço</dd>
        <dt>Iaas</dt>
        <dd>infraestrutura Como Serviço</dd>
        <dt>Paas</dt>
        <dd>Platafroma Como Serviço</dd>
        <dt>SaaS</dt>
        <dd>Sofware Como Serviço</dd>
    </d1>
</body>
</html>
