<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        /* Reset estrutura básica */
        body{
            font-family:Arial, Helvetica, sans-serif;
            margin:100px;
            padding:100px;
            background-color: #c6d3f0;
            display:flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .form-container{
            background-color: #bbd0e4;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 1);
            padding: 30px;
            width: 100%;
            max-width: 400px;
        }

        h1{
            text-align: center;
            color: #000000;
            margin-bottom: 30px;

        }

        form{
            display: flex;
            flex-direction: column;
        }

        .form-group{
            margin-bottom: 20px;
        }

        label{
            font-weight: bold;
            margin-bottom:5px;
            display:block;
        }
        input,
        textarea,
        select,
        button{
            width:100%;
            padding: 12px;
            margin-top:5px;
            border:1px solid #ccc;
            font-size:14px;
            box-sizing: border-box;
            background-color: #f0f8ff;
        }

        input[type="radio"]
        input[type="checkbox"]{
            display: inline-block;
            width:auto;
            margin-right: 10px;
        }
        button{
            background-color: #7dabd6;
            color: white;
            border:none;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover{
            background-color: #9cb0dd;
        }

        select, textarea{
            transition: border-color 0.3s;
        }
        input:focus,
        textarea:focus,
        select:focus{
            border-color: #00bcd4;
            outline:none;
        }
        fieldset{
            border:none;
            padding: 0;
        }
        legend{
            font-weight: bold;
            margin-bottom: 10px;

        }
        .buttons{
            display:frex;
            justify-content: space-between;
            gap:10px;
        }
        
    </style>
</head>
<body>
    <div class="form-container">
        <h1>Formulário</h1>


        <form Method="POST" action="http://localhost:3003/usuarios">
            <input type="hidden" name="id" value="3">


            <div class="form-group">
                <label for="name">Nome</label>
                <input type="text" id="name" name="name" id="name" placeholder="Digite seu nome">
            </div>
           
            <div class="form-group">
                <label for="name">Senha</label>
                <input type="password" id="senha" name="senha" id="senha" placeholder="Digite a sua senha">
            </div>


            <div class="form-group">
                <label for="bio">Bio</label>
                <textarea name="bio" id="30" rows="10" placeholder="Conte um pouco sobre você"></textarea>
            </div>
            <fieldset class="form-group">
                <legend>Tipo de usuário</legend>
                <label for="admin">
                    <input type="radio" name="tipo" id="admin" value="admin"> Admin
                </label>
                <label for="regular">
                    <input type="radio" name="regular" id="regular" value="regular"> Regular
                </label>
                <label for="professor">
                    <input type="radio" name="tipo" id="professor"> Professor
                </label>
            </fieldset>
       
            <div class="form-group">
                <label for="ativo">
                    <input type="checkbox" name="ativo" id="ativo"> Ativo
                </label>
            </div>

            <div class="form-group">
                <label for="estado">Estado</label>
                <select name="estado" id="id">
                    <option value="">Selecione</option>
                    <option value="pr">Paraná</option>
                    <option value="rj">Rio de Janeiro</option>
                    <option value="sp">São Paulo</option>
                    <option value="sc">Santa Catarina</option>
                    <option value="mg">Minas Gerais</option>
                    <option value="ba">Bahia</option>
                    <option value="ac">Acre</option>
                    <option value="pa">Pará</option>
                    <option value="rs">Rio Grande do Sul</option>
                    <option value="df">Distrito Federal</option>
                    <option value="rn">Rio Grande do Norte</option>
                    <!-- input:date#data -->
                </select>
            <div class="form-group">
                <label for="interesses">Interesses</label>
                <select name="interesses" id="interesses" multiple-size="7">
                    <option value="js">Java Script</option>
                    <option value="java">Java</option>
                    <option value="php">PHP</option>
                    <option value="python">Pyhton</option>
                    <option value="go">Go</option>
                    <option value="c">C</option>
                </select>
            </div>

            <div class="form-group button">
                <button type="submit">Incluir</button>
                <button 
                formaction="http:localhost:3003/usuarios3"
                type="submit">Alterar</button>
            </div>
            </div>
        </form>
            </div>
   
</body>
</html>
